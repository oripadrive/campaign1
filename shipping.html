<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全ユーザー発送無料 | オリパドライブ</title>
  <meta
    name="description"
    content="オリパドライブは全ユーザー発送無料。合計500コイン以上で発送可能。送料0円で気軽に発送できます。"
  />
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family:
        "Hiragino Sans",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    a {
      text-decoration: none;
    }

    .shipping-page {
      min-height: 100vh;
      background:
        linear-gradient(180deg, #b40000 0%, #8c0000 220px, #f5f5f5 220px, #f5f5f5 100%);
      padding: 16px 16px 40px;
    }

    .shipping-container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .shipping-banner-wrap {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.2);
      background: #fff;
      margin-bottom: 20px;
    }

    .shipping-banner {
      width: 100%;
    }

    .shipping-content {
      background: #fff;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
    }

    .shipping-kicker {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff1f1;
      color: #c40000;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .shipping-title {
      margin: 0 0 14px;
      font-size: 38px;
      line-height: 1.25;
      font-weight: 900;
      color: #b40000;
    }

    .shipping-lead {
      margin: 0 0 22px;
      font-size: 16px;
      line-height: 1.9;
      color: #333;
    }

    .shipping-lead strong {
      color: #c40000;
    }

    .shipping-points {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .shipping-point {
      background: linear-gradient(180deg, #fff8f8 0%, #ffffff 100%);
      border: 1px solid #ffd7d7;
      border-radius: 14px;
      padding: 18px 16px;
    }

    .shipping-point__label {
      margin: 0 0 8px;
      font-size: 17px;
      font-weight: 900;
      color: #b40000;
    }

    .shipping-point__text {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: #444;
    }

    .shipping-message {
      margin: 0 0 24px;
      padding: 20px 22px;
      border-radius: 16px;
      background: #fafafa;
      border-left: 6px solid #ffb400;
    }

    .shipping-message p {
      margin: 0;
      font-size: 15px;
      line-height: 1.9;
      color: #333;
    }

    .shipping-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 28px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffd34d 0%, #ffab1f 100%);
      color: #2b1200;
      font-size: 16px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(255, 170, 20, 0.28);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .shipping-cta:hover {
      transform: translateY(-2px);
      opacity: 0.98;
    }

    @media (max-width: 900px) {
      .shipping-title {
        font-size: 30px;
      }

      .shipping-points {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shipping-page {
        padding: 10px 10px 24px;
        background:
          linear-gradient(180deg, #b40000 0%, #8c0000 150px, #f5f5f5 150px, #f5f5f5 100%);
      }

      .shipping-banner-wrap {
        border-radius: 12px;
        margin-bottom: 12px;
      }

      .shipping-content {
        border-radius: 12px;
        padding: 18px 14px;
      }

      .shipping-kicker {
        margin-bottom: 10px;
        font-size: 11px;
      }

      .shipping-title {
        font-size: 24px;
        margin-bottom: 10px;
      }

      .shipping-lead {
        font-size: 14px;
        line-height: 1.8;
        margin-bottom: 16px;
      }

      .shipping-point {
        border-radius: 12px;
        padding: 14px 12px;
      }

      .shipping-point__label {
        font-size: 15px;
      }

      .shipping-point__text {
        font-size: 13px;
      }

      .shipping-message {
        padding: 15px 14px;
        border-radius: 12px;
        margin-bottom: 18px;
      }

      .shipping-message p {
        font-size: 14px;
        line-height: 1.8;
      }

      .shipping-cta {
        width: 100%;
        min-height: 50px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="shipping-page">
    <div class="shipping-container">
      <div class="shipping-banner-wrap">
        <img
          src="./images/shipping-free-banner.png"
          alt="オリパドライブ 全ユーザー発送無料 合計500コイン以上のみ発送可能"
          class="shipping-banner"
        />
      </div>

      <section class="shipping-content">
        <div class="shipping-kicker">ORIPA DRIVE SHIPPING</div>

        <h1 class="shipping-title">オリパドライブは全ユーザー発送無料</h1>

        <p class="shipping-lead">
          オリパドライブでは、獲得した賞品を
          <strong>全ユーザー送料無料</strong>で発送できます。<br>
          送料を気にせず、受け取りたいタイミングでそのまま発送可能です。
        </p>

        <div class="shipping-points">
          <div class="shipping-point">
            <h2 class="shipping-point__label">発送条件</h2>
            <p class="shipping-point__text">
              賞品の合計が500コイン以上で発送できます。
            </p>
          </div>

          <div class="shipping-point">
            <h2 class="shipping-point__label">送料</h2>
            <p class="shipping-point__text">
              発送料はいつでも0円。追加料金はかかりません。
            </p>
          </div>

          <div class="shipping-point">
            <h2 class="shipping-point__label">まとめ発送</h2>
            <p class="shipping-point__text">
              賞品をまとめて発送することもできます。
            </p>
          </div>
        </div>

        <div class="shipping-message">
          <p>
            当たった賞品を、もっと気軽に、もっと受け取りやすく。<br>
            オリパドライブなら、発送までしっかりお得に楽しめます。
          </p>
        </div>

        <a
          href="https://www.oripa-drive.com/me/cards"
          class="shipping-cta"
        >
          発送ページへ進む
        </a>
      </section>
    </div>
  </main>
</body>
</html>
